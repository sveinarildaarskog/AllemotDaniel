<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alle mot Daniel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.view{display:none;padding:20px}

button,input,select{
  padding:10px;
  margin:5px;
  font-size:16px;
}

.qr{
  background:white;
  padding:20px;
  border-radius:20px;
  width:300px;
  margin:20px auto;
  color:black;
}

#playersList div{
  padding:5px;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  updateDoc,
  onSnapshot,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
  apiKey: "AIzaSyDE7W...",
  authDomain: "alle-mot-konfirmanten.firebaseapp.com",
  projectId: "alle-mot-konfirmanten"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- MODE ---------------- */

const mode = new URLSearchParams(window.location.search).get("mode") || "player";

let player = localStorage.getItem("player") || "";

/* ---------------- QUESTIONS ---------------- */

const questions = [
  "Sengestrekk",
  "Straffespark",
  "Bottleflip",
  "Vannpistol og telys",
  "Biola bånnski",
  "Vann på hodet",
  "Triksekongen",
  "Frisbeekast"
];

/* ---------------- VIEW ---------------- */

function show(id){
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById(id).style.display="block";
}

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {

  listenGame();
  listenPlayers();

  if(mode === "admin"){
    show("adminLobby");
    generateQR();
  } else {
    show("login");
  }
});

/* ---------------- QR ---------------- */

function generateQR(){
  const url = window.location.origin + window.location.pathname + "?mode=join";

  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
    + encodeURIComponent(url);
}

/* ---------------- LISTEN GAME ---------------- */

function listenGame(){
  onSnapshot(doc(db,"game","state"), snap=>{
    if(!snap.exists()) return;
    renderGame(snap.data());
  });
}

/* ---------------- LISTEN PLAYERS ---------------- */

function listenPlayers(){
  onSnapshot(collection(db,"players"), snap => {

    const list = document.getElementById("playersList");
    if(!list) return;

    list.innerHTML = "";

    snap.forEach(d => {
      const p = d.data();
      list.innerHTML += `<div>👤 ${p.name}</div>`;
    });
  });
}

/* ---------------- RENDER ---------------- */

function renderGame(data){

  const q = questions[data.currentRound] || "Ferdig!";

  /* ---------------- ADMIN ---------------- */
  if(mode === "admin"){

    document.getElementById("adminState").innerText =
      `State: ${data.gameState} | Runde: ${data.currentRound}`;

    document.getElementById("currentQuestion").innerText = q;

    if(data.gameState === "lobby"){
      show("adminLobby");
      return;
    }

    show("adminControl");
  }

  /* ---------------- PLAYER ---------------- */
  if(mode !== "admin"){

    const title = document.getElementById("title");
    const box = document.getElementById("answerBox");

    if(data.gameState === "lobby"){
      show("player");
      title.innerText = "Venter på start...";
      box.style.display = "none";
    }

    if(data.gameState === "question"){
      show("player");
      title.innerText = q;
      box.style.display = "none";
    }

    if(data.gameState === "answering"){
      show("player");
      title.innerText = q;
      box.style.display = "block";
    }

    if(data.gameState === "locked"){
      show("player");
      title.innerText = "Svar låst";
      box.style.display = "none";
    }
  }
}

/* ---------------- JOIN ---------------- */

window.join = async () => {

  const name = document.getElementById("name").value;

  player = name;
  localStorage.setItem("player", name);

  await setDoc(doc(db,"players",name),{
    name
  });

  show("player");
};

/* ---------------- ADMIN CONTROL ---------------- */

window.resetGame = async () => {
  await setDoc(doc(db,"game","state"),{
    gameState:"lobby",
    currentRound:0
  });
};

window.startGame = async () => {
  await setDoc(doc(db,"game","state"),{
    gameState:"question",
    currentRound:0
  });
};

window.startAnswer = async () => {
  await updateDoc(doc(db,"game","state"),{
    gameState:"answering"
  });
};

window.lock = async () => {
  await updateDoc(doc(db,"game","state"),{
    gameState:"locked"
  });
};

window.next = async () => {

  const snap = await getDoc(doc(db,"game","state"));
  const data = snap.data();

  let next = data.currentRound + 1;

  if(next >= 8){
    await updateDoc(doc(db,"game","state"),{
      gameState:"finished",
      currentRound:7
    });
    return;
  }

  await updateDoc(doc(db,"game","state"),{
    gameState:"question",
    currentRound:next
  });
};

</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="view">
<h1>Alle mot Daniel</h1>

<input id="name" placeholder="Kallenavn"><br>
<button onclick="join()">Bli med</button>
</div>

<!-- PLAYER -->
<div id="player" class="view">
<h2 id="title"></h2>

<div id="answerBox" style="display:none;">
<input type="range" min="0" max="100" value="50">
<button onclick="sendAnswer()">Svar</button>
</div>
</div>

<!-- ADMIN LOBBY -->
<div id="adminLobby" class="view">
<h1>Alle mot Daniel</h1>

<div class="qr">
<img id="qr">
</div>

<button onclick="resetGame()">🔄 Nytt spill</button>
<button onclick="startGame()">Start spill</button>

<h3>Deltakere</h3>
<div id="playersList"></div>
</div>

<!-- ADMIN CONTROL -->
<div id="adminControl" class="view">
<h1>ADMIN</h1>

<h2 id="currentQuestion"></h2>

<h3 id="adminState"></h3>

<button onclick="startAnswer()">Start svar</button>
<button onclick="lock()">Lås</button>
<button onclick="next()">Neste</button>
</div>

</body>
</html>
