<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alle mot Daniel - FIXED</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.view{display:none;padding:20px}

.card{
  background:#222;
  padding:20px;
  margin:20px auto;
  max-width:500px;
  border-radius:15px;
}

button,input,select{
  padding:10px;
  margin:5px;
  font-size:16px;
}

.slider{width:80%}

.qr{
  background:white;
  padding:20px;
  border-radius:20px;
  width:320px;
  margin:20px auto;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  updateDoc,
  onSnapshot,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDE7WQY2NZ8ZgAvD8Rm1Mq_owxddA8LHQM",
  authDomain: "alle-mot-konfirmanten.firebaseapp.com",
  projectId: "alle-mot-konfirmanten"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const mode = new URLSearchParams(window.location.search).get("mode") || "player";

let player = localStorage.getItem("player") || "";
let role = localStorage.getItem("role") || "player";

let round = 0;
let state = "waiting";

/* ---------------- VIEW ---------------- */

function show(id){
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById(id).style.display="block";
}

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {
  listenState();

  if(mode === "admin"){
    show("adminLobby");
    generateQR();
  } else {
    show(player ? "player" : "login");
  }
});

/* ---------------- GAME STATE ---------------- */

function listenState(){
  onSnapshot(doc(db,"game","state"), snap=>{
    if(!snap.exists()) return;

    const data = snap.data();
    state = data.gameState;
    round = data.currentRound;

    renderPlayer(data);
    renderAdmin(data);
  });
}

/* ---------------- QR ---------------- */

function generateQR(){
  const url = window.location.origin + window.location.pathname + "?mode=join";

  const img = document.getElementById("qr");
  img.src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(url);
}

/* ---------------- ADMIN SCREENS ---------------- */

function renderAdmin(stateData){

  if(mode !== "admin") return;

  document.getElementById("adminState").innerText =
    `State: ${stateData.gameState} | Runde: ${stateData.currentRound}`;

  if(stateData.gameState === "waiting"){
    show("adminLobby");
  } else {
    show("adminControl");
  }
}

/* ---------------- PLAYER SCREENS ---------------- */

function renderPlayer(stateData){

  if(mode === "admin") return;

  const title = document.getElementById("title");
  const box = document.getElementById("answerBox");

  if(stateData.gameState === "waiting"){
    show("player");
    title.innerText = "Venter på oppgave...";
    box.style.display = "none";
  }

  if(stateData.gameState === "question"){
    show("player");
    title.innerText = "Oppgave vises snart...";
    box.style.display = "none";
  }

  if(stateData.gameState === "answering"){
    show("player");
    title.innerText = "SVAR NÅ!";
    box.style.display = "block";
  }

  if(stateData.gameState === "locked"){
    show("player");
    title.innerText = "Svar låst!";
    box.style.display = "none";
  }
}

/* ---------------- JOIN ---------------- */

window.join = async () => {

  const name = document.getElementById("name").value;
  const selectedRole = document.getElementById("role").value;

  player = name;
  role = selectedRole;

  localStorage.setItem("player", name);
  localStorage.setItem("role", role);

  await setDoc(doc(db,"players",name),{
    name,
    role,
    online:true,
    lastSeen:Date.now()
  });

  show("player");
};

/* ---------------- ADMIN CONTROLS ---------------- */

window.setQuestion = async () => {
  await setDoc(doc(db,"game","state"),{
    gameState:"question",
    currentRound:round
  });
};

window.startAnswer = async () => {
  await updateDoc(doc(db,"game","state"),{
    gameState:"answering"
  });
};

window.lockAnswers = async () => {
  await updateDoc(doc(db,"game","state"),{
    gameState:"locked"
  });
};

window.nextRound = async () => {
  round++;

  await updateDoc(doc(db,"game","state"),{
    gameState:"waiting",
    currentRound:round
  });
};

/* ---------------- ONLINE LIST ---------------- */

onSnapshot(collection(db,"players"), snap=>{
  const list = document.getElementById("players");
  if(!list) return;

  list.innerHTML = "";

  snap.forEach(d=>{
    const p = d.data();
    list.innerHTML += `<div>${p.name} (${p.role})</div>`;
  });
});

</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="view">
<h1>Alle mot Daniel</h1>

<input id="name" placeholder="Kallenavn"><br>

<select id="role">
<option value="player">Deltaker</option>
<option value="daniel">Daniel</option>
</select><br>

<button onclick="join()">Bli med</button>
</div>

<!-- PLAYER -->
<div id="player" class="view">
<h2 id="title">Venter...</h2>

<div id="answerBox" style="display:none;">
<input type="range" min="0" max="100" value="50" id="slider">
<div id="val">50</div>
<button onclick="sendAnswer()">Svar</button>
</div>
</div>

<!-- ADMIN LOBBY (QR + START) -->
<div id="adminLobby" class="view">
<h1>Admin Lobby</h1>

<div class="qr">
<img id="qr">
</div>

<h3 id="adminState"></h3>

<button onclick="show('adminControl')">Start spill</button>

<h3>Deltakere</h3>
<div id="players"></div>
</div>

<!-- ADMIN CONTROL -->
<div id="adminControl" class="view">
<h1>Admin Control</h1>

<h3 id="adminState"></h3>

<button onclick="setQuestion()">Vis oppgave</button>
<button onclick="startAnswer()">Start svar</button>
<button onclick="lockAnswers()">Lås</button>
<button onclick="nextRound()">Neste</button>
</div>

<script>
document.addEventListener("input", e=>{
  if(e.target.id==="slider"){
    document.getElementById("val").innerText = e.target.value;
  }
});
</script>

</body>
</html>
