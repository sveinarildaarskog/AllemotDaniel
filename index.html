<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alle mot Daniel - LIVE</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDE7WQY2NZ8ZgAvD8Rm1Mq_owxddA8LHQM",
  authDomain: "alle-mot-konfirmanten.firebaseapp.com",
  projectId: "alle-mot-konfirmanten"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const mode = new URLSearchParams(window.location.search).get("mode") || "player";

let player = localStorage.getItem("player") || "";
let role = localStorage.getItem("role") || "player";
let currentRound = 0;
let timerRunning = false;

const questions = [
  "Sengestrekk",
  "Straffespark",
  "Bottle flip",
  "Vannpistol og telys",
  "Biola bånnski",
  "Vann på hodet",
  "Triksekongen",
  "Frisbeekast"
];

function show(id){
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById(id).style.display="block";
}

// MODE routing
if(mode === "admin") show("adminLobby");
else show(player ? "game" : "login");

// JOIN
window.join = async () => {
  const name = document.getElementById("name").value;
  const selectedRole = document.getElementById("role").value;
  if(!name) return alert("Skriv navn");

  player = name;
  role = selectedRole;

  localStorage.setItem("player", name);
  localStorage.setItem("role", selectedRole);

  await setDoc(doc(db, "players", name), {
    name,
    role,
    score: 0
  });

  show("game");
};

// ADMIN START GAME
window.startGame = () => {
  show("adminGame");
  document.getElementById("questionTitle").innerText = questions[currentRound];
};

// TIMER
window.startTimer = () => {
  timerRunning = true;
  let time = 30;
  const el = document.getElementById("timer");

  const interval = setInterval(() => {
    el.innerText = "Tid: " + time;
    time--;
    if(time < 0){
      clearInterval(interval);
      timerRunning = false;
    }
  }, 1000);
};

// ANSWER
window.sendAnswer = async () => {
  const val = Number(document.getElementById("slider").value);
  await addDoc(collection(db, "answers"), {
    name: player,
    role,
    value: val,
    round: currentRound
  });
};

// LISTEN PLAYERS
onSnapshot(collection(db, "players"), snap => {
  const list = document.getElementById("players");
  if(!list) return;
  list.innerHTML = "";
  snap.forEach(d => {
    const p = d.data();
    list.innerHTML += `<div>${p.name} (${p.role})</div>`;
  });
});

// NEXT ROUND
window.next = () => {
  currentRound++;
  document.getElementById("questionTitle").innerText = questions[currentRound] || "Ferdig";
};

</script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center}
.view{display:none;padding:20px}
input,button{padding:10px;margin:5px}
.slider{width:80%}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="view">
<h1>Alle mot Daniel</h1>
<input id="name" placeholder="Kallenavn"><br>
<select id="role">
<option value="player">Deltaker</option>
<option value="daniel">Daniel</option>
</select><br>
<button onclick="join()">Bli med</button>
</div>

<!-- ADMIN LOBBY -->
<div id="adminLobby" class="view">
<h1>Scan QR og bli med</h1>
<p>(QR kan legges til senere)</p>
<div id="players"></div>
<button onclick="startGame()">Start spillet</button>
</div>

<!-- ADMIN GAME / SCREEN -->
<div id="adminGame" class="view">
<h1 id="questionTitle"></h1>
<h2 id="timer">Tid: 30</h2>
<button onclick="startTimer()">Start nedtelling</button>
<button onclick="next()">Neste oppgave</button>
</div>

<!-- PLAYER / DANIEL -->
<div id="game" class="view">
<h2 id="q"></h2>
<input type="range" min="0" max="100" value="50" id="slider" class="slider">
<div id="val">50</div>
<button onclick="sendAnswer()">Svar</button>
</div>

<script>
const slider = document.getElementById("slider");
if(slider){
  slider.oninput = () => {
    document.getElementById("val").innerText = slider.value;
  }
}
</script>

</body>
</html>
