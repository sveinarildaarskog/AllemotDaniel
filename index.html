<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alle mot Daniel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.view{display:none;padding:20px}

button,input{
  padding:10px;
  margin:5px;
  font-size:16px;
}

.qr{
  background:white;
  padding:20px;
  border-radius:20px;
  width:280px;
  margin:20px auto;
  color:black;
}

.bigTimer{
  font-size:50px;
  margin:20px;
}

#playersList div{
  padding:4px;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  updateDoc,
  deleteDoc,
  onSnapshot,
  collection,
  addDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDE7W...",
  authDomain: "alle-mot-konfirmanten.firebaseapp.com",
  projectId: "alle-mot-konfirmanten"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */
const mode = (new URLSearchParams(window.location.search).get("mode") || "player").toLowerCase();

let player = "";
let hasAnswered = false;

/* QUESTIONS */
const questions = [
  "Sengestrekk",
  "Straffespark",
  "Bottleflip",
  "Vannpistol og telys",
  "Biola bånnski",
  "Vann på hodet",
  "Triksekongen",
  "Frisbeekast"
];

/* UI */
function show(id){
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById(id).style.display="block";
}

/* INIT */
window.addEventListener("load", () => {

  listenGame();
  listenPlayers();

  if(mode === "admin"){
    show("adminLobby");
    generateQR();
  } else {
    show("login");
  }
});

/* QR */
function generateQR(){
  const url = window.location.origin + window.location.pathname + "?mode=player";
  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
    + encodeURIComponent(url);
}

/* GAME */
function listenGame(){
  onSnapshot(doc(db,"game","state"), snap => {

    if(!snap.exists()) return;

    const data = snap.data();

    if(mode === "admin"){

      if(data.gameState === "lobby"){
        show("adminLobby");
      } else {
        show("adminControl");
      }

      renderAdmin(data);
      return;
    }

    if(!player){
      show("login");
      return;
    }

    renderPlayer(data);
  });
}

/* PLAYER */
function renderPlayer(data){

  show("player");

  const title = document.getElementById("title");
  const box = document.getElementById("answerBox");

  title.innerText = questions[data.currentRound] || "";

  if(data.gameState === "lobby"){
    title.innerText = "Venter på start...";
    box.style.display = "none";
  }

  if(data.gameState === "question"){
    hasAnswered = false;
    document.getElementById("slider").disabled = false;
    document.getElementById("answerBtn").style.display = "block";
    box.style.display = "none";
  }

  if(data.gameState === "answering"){
    if(!hasAnswered){
      box.style.display = "block";
    } else {
      box.style.display = "none";
      title.innerText = "Vent på svar ⏳";
    }
  }

  if(data.gameState === "locked"){
    box.style.display = "none";
    title.innerText = "Tiden er ute ✔";
  }
}

/* ADMIN */
function renderAdmin(data){

  document.getElementById("currentQuestion").innerText =
    questions[data.currentRound] || "";

  document.getElementById("timer").innerText =
    data.timer || "";
}

/* PLAYERS */
function listenPlayers(){
  onSnapshot(collection(db,"players"), snap => {

    const list = document.getElementById("playersList");
    if(!list) return;

    list.innerHTML = "";

    const now = Date.now();

    snap.forEach(d=>{
      const p = d.data();
      if(now - (p.lastSeen || 0) < 10000){
        list.innerHTML += `<div>👤 ${p.name}</div>`;
      }
    });
  });
}

/* JOIN */
window.join = async () => {

  const name = document.getElementById("name").value;

  player = name;
  hasAnswered = false;

  await setDoc(doc(db,"players",name),{
    name,
    lastSeen: Date.now()
  });

  setInterval(async () => {
    await updateDoc(doc(db,"players",player),{
      lastSeen: Date.now()
    });
  },5000);

  show("player");
};

/* SEND ANSWER */
window.sendAnswer = async () => {

  if(hasAnswered) return;

  const val = document.getElementById("slider").value;

  await addDoc(collection(db,"answers"),{
    name: player,
    value: Number(val),
    time: Date.now()
  });

  hasAnswered = true;

  document.getElementById("slider").disabled = true;
  document.getElementById("answerBtn").style.display = "none";

  document.getElementById("title").innerText = "Vent på svar ⏳";
  document.getElementById("answerBox").style.display = "none";
};

/* ADMIN */
window.startGame = async () => {

  await setDoc(doc(db,"game","state"),{
    gameState:"question",
    currentRound:0,
    timer:0
  });

  show("adminControl");
};

window.startCountdown = async () => {

  let time = 30;

  await updateDoc(doc(db,"game","state"),{
    gameState:"answering",
    timer: time
  });

  const interval = setInterval(async () => {

    time--;

    await updateDoc(doc(db,"game","state"),{
      timer: time
    });

    if(time <= 0){
      clearInterval(interval);

      await updateDoc(doc(db,"game","state"),{
        gameState:"locked",
        timer: 0
      });
    }

  },1000);
};

window.next = async () => {

  const snap = await getDoc(doc(db,"game","state"));
  const data = snap.data();

  await updateDoc(doc(db,"game","state"),{
    gameState:"question",
    currentRound: data.currentRound + 1
  });
};

</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="view">
<h1>Alle mot Daniel</h1>
<input id="name" placeholder="Kallenavn"><br>
<button onclick="join()">Bli med</button>
</div>

<!-- PLAYER -->
<div id="player" class="view">
<h2 id="title"></h2>

<div id="answerBox" style="display:none;">
<input type="range" min="0" max="100" value="50" id="slider">
<div id="sliderValue">50</div>
<br>
<button id="answerBtn" onclick="sendAnswer()">Svar</button>
</div>
</div>

<!-- ADMIN LOBBY -->
<div id="adminLobby" class="view">
<h1>Alle mot Daniel</h1>

<div class="qr">
<img id="qr">
</div>

<button onclick="startGame()">Start spill</button>

<h3>Deltakere</h3>
<div id="playersList"></div>
</div>

<!-- ADMIN CONTROL -->
<div id="adminControl" class="view">
<h2 id="currentQuestion"></h2>

<div class="bigTimer" id="timer"></div>

<button onclick="startCountdown()">Start 30 sek</button>
<button onclick="next()">Neste</button>
</div>

<script>
document.addEventListener("input", e=>{
  if(e.target.id === "slider"){
    document.getElementById("sliderValue").innerText = e.target.value;
  }
});
</script>

</body>
</html>
