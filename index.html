<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alle mot Daniel - FINAL FIX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.view{display:none;padding:20px}

.card{
  background:#222;
  padding:20px;
  margin:20px auto;
  max-width:500px;
  border-radius:15px;
}

button,input,select{
  padding:10px;
  margin:5px;
  font-size:16px;
}

.qr{
  background:white;
  padding:20px;
  border-radius:20px;
  width:320px;
  margin:20px auto;
  color:black;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  updateDoc,
  onSnapshot,
  collection
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDE7WQY2NZ8ZgAvD8Rm1Mq_owxddA8LHQM",
  authDomain: "alle-mot-konfirmanten.firebaseapp.com",
  projectId: "alle-mot-konfirmanten"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const mode = new URLSearchParams(window.location.search).get("mode") || "player";

let player = localStorage.getItem("player") || "";
let role = localStorage.getItem("role") || "player";

/* ---------------- QUESTIONS ---------------- */

const questions = [
  "Sengestrekk",
  "Straffespark",
  "Bottleflip",
  "Vannpistol og telys",
  "Biola bånnski",
  "Vann på hodet",
  "Triksekongen",
  "Frisbeekast"
];

let state = "lobby";
let round = 0;

/* ---------------- VIEW ---------------- */

function show(id){
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById(id).style.display="block";
}

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {
  listen();

  if(mode === "admin"){
    show("adminLobby");
    generateQR();
  } else {
    show(player ? "player" : "login");
  }
});

/* ---------------- QR ---------------- */

function generateQR(){
  const url = window.location.origin + window.location.pathname + "?mode=join";

  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
    + encodeURIComponent(url);
}

/* ---------------- FIREBASE LISTEN ---------------- */

function listen(){
  onSnapshot(doc(db,"game","state"), snap=>{
    if(!snap.exists()) return;

    const data = snap.data();

    state = data.gameState;
    round = data.currentRound;

    render(data);
  });
}

/* ---------------- RENDER ---------------- */

function render(data){

  const q = questions[data.currentRound] || "Ingen oppgave";

  // ADMIN
  if(mode === "admin"){

    document.getElementById("adminState").innerText =
      `State: ${data.gameState} | Runde: ${data.currentRound}`;

    document.getElementById("currentQuestion").innerText = q;

    if(data.gameState === "lobby"){
      show("adminLobby");
    } else {
      show("adminControl");
    }
  }

  // PLAYER
  if(mode !== "admin"){

    const title = document.getElementById("title");
    const box = document.getElementById("answerBox");

    if(data.gameState === "lobby"){
      show("player");
      title.innerText = "Venter på at spillet starter...";
      box.style.display = "none";
    }

    if(data.gameState === "question"){
      show("player");
      title.innerText = q;   // 🔥 OPPGAVEN VISES HER
      box.style.display = "none";
    }

    if(data.gameState === "answering"){
      show("player");
      title.innerText = q;
      box.style.display = "block";
    }

    if(data.gameState === "locked"){
      show("player");
      title.innerText = "Svar låst";
      box.style.display = "none";
    }
  }
}

/* ---------------- JOIN ---------------- */

window.join = async () => {

  const name = document.getElementById("name").value;
  const selectedRole = document.getElementById("role").value;

  player = name;
  role = selectedRole;

  localStorage.setItem("player", name);
  localStorage.setItem("role", role);

  await setDoc(doc(db,"players",name),{
    name,
    role
  });

  show("player");
};

/* ---------------- ADMIN CONTROL ---------------- */

window.startGame = async () => {
  await setDoc(doc(db,"game","state"),{
    gameState:"question",
    currentRound:0
  });
};

window.startAnswer = async () => {
  await updateDoc(doc(db,"game","state"),{
    gameState:"answering"
  });
};

window.lock = async () => {
  await updateDoc(doc(db,"game","state"),{
    gameState:"locked"
  });
};

window.next = async () => {
  round++;

  await updateDoc(doc(db,"game","state"),{
    gameState:"question",
    currentRound:round
  });
};

</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="view">
<h1>Alle mot Daniel</h1>

<input id="name" placeholder="Kallenavn"><br>

<select>
<option value="player">Deltaker</option>
<option value="daniel">Daniel</option>
</select><br>

<button onclick="join()">Bli med</button>
</div>

<!-- PLAYER -->
<div id="player" class="view">
<h2 id="title">...</h2>

<div id="answerBox" style="display:none;">
<input type="range" min="0" max="100" value="50" id="slider">
<div id="val">50</div>
</div>
</div>

<!-- ADMIN LOBBY -->
<div id="adminLobby" class="view">
<h1>🔵 Bli med i spillet</h1>

<div class="qr">
<img id="qr">
</div>

<h3 id="adminState"></h3>

<button onclick="startGame()">Start spillet</button>
</div>

<!-- ADMIN CONTROL -->
<div id="adminControl" class="view">
<h1>ADMIN</h1>

<h2 id="currentQuestion"></h2>

<h3 id="adminState"></h3>

<button onclick="startAnswer()">Start svar</button>
<button onclick="lock()">Lås</button>
<button onclick="next()">Neste</button>
</div>

</body>
</html>
