<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alle mot Daniel - FINAL STABLE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.view{display:none;padding:20px}

input,select,button{
  padding:10px;
  margin:5px;
  font-size:16px;
}

.qr-box{
  background:white;
  padding:20px;
  border-radius:20px;
  width:320px;
  margin:20px auto;
}

.qr-box img{
  width:280px;
  height:280px;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDE7WQY2NZ8ZgAvD8Rm1Mq_owxddA8LHQM",
  authDomain: "alle-mot-konfirmanten.firebaseapp.com",
  projectId: "alle-mot-konfirmanten"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const mode = new URLSearchParams(window.location.search).get("mode") || "player";

let player = localStorage.getItem("player") || "";
let role = localStorage.getItem("role") || "player";

let round = 0;
let locked = false;

/* ---------------- NAVIGASJON ---------------- */
function show(id){
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById(id).style.display="block";
}

window.addEventListener("load", () => {
  if(mode === "admin"){
    show("adminLobby");
    generateQR();
  } else {
    show("login");
  }
});

/* ---------------- QR (100% STABIL) ---------------- */
function generateQR(){
  const url = window.location.origin + window.location.pathname + "?mode=join";

  const img = document.getElementById("qr");
  const link = document.getElementById("joinLink");

  link.innerText = url;

  img.src =
    "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
    + encodeURIComponent(url);
}

/* ---------------- JOIN ---------------- */
window.join = async () => {
  const name = document.getElementById("name").value;
  const selectedRole = document.getElementById("role").value;

  if(!name) return alert("Skriv navn");

  player = name;
  role = selectedRole;

  localStorage.setItem("player", name);
  localStorage.setItem("role", role);

  await setDoc(doc(db,"players",name),{
    name,
    role
  });

  show("game");
};

/* ---------------- SEND SVAR ---------------- */
window.sendAnswer = async () => {
  if(locked) return alert("Svar låst");

  const val = Number(document.getElementById("slider").value);

  await addDoc(collection(db,"answers"),{
    name:player,
    role,
    value:val,
    round
  });
};

/* ---------------- TIMER ---------------- */
window.startTimer = () => {
  locked = false;

  let t = 30;
  const el = document.getElementById("timer");

  const i = setInterval(()=>{
    el.innerText = "Tid: " + t;
    t--;

    if(t < 0){
      clearInterval(i);
      locked = true;
    }
  },1000);
};

/* ---------------- NEXT ROUND ---------------- */
window.next = () => {
  round++;
  document.getElementById("questionTitle").innerText =
    "Runde " + (round+1);
};

/* ---------------- LIVE PLAYERS ---------------- */
onSnapshot(collection(db,"players"),snap=>{
  const list = document.getElementById("players");
  if(!list) return;

  list.innerHTML = "";

  snap.forEach(d=>{
    const p = d.data();
    list.innerHTML += `<div>${p.name} (${p.role})</div>`;
  });
});

</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="view">
<h1>Alle mot Daniel</h1>

<input id="name" placeholder="Kallenavn"><br>

<select id="role">
  <option value="player">Deltaker</option>
  <option value="daniel">Daniel</option>
</select><br>

<button onclick="join()">Bli med</button>
</div>

<!-- ADMIN LOBBY -->
<div id="adminLobby" class="view">
<h1>Scan QR og bli med</h1>

<div class="qr-box">
  <img id="qr">
</div>

<p id="joinLink"></p>

<h3>Deltakere</h3>
<div id="players"></div>

<button onclick="show('adminGame')">Start spillet</button>
</div>

<!-- ADMIN GAME -->
<div id="adminGame" class="view">
<h1 id="questionTitle">Spill starter</h1>

<h2 id="timer">Tid: 30</h2>

<button onclick="startTimer()">Start nedtelling</button>
<button onclick="next()">Neste</button>
</div>

<!-- SPILLER -->
<div id="game" class="view">
<h2>Gi svar</h2>

<input type="range" min="0" max="100" value="50" id="slider">
<div id="val">50</div>

<button onclick="sendAnswer()">Svar</button>
</div>

<script>
document.addEventListener("input", e=>{
  if(e.target.id === "slider"){
    document.getElementById("val").innerText = e.target.value;
  }
});
</script>

</body>
</html>
