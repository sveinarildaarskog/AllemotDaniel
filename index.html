<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alle mot Daniel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

/* 🔥 FIX: all views hidden by default */
.view{
  display:none;
  padding:20px;
}

.qr{
  background:white;
  padding:20px;
  border-radius:20px;
  width:320px;
  margin:20px auto;
  color:black;
}

button,input,select{
  padding:10px;
  margin:5px;
  font-size:16px;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  updateDoc,
  onSnapshot,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
  apiKey: "AIzaSyDE7W...",
  authDomain: "alle-mot-konfirmanten.firebaseapp.com",
  projectId: "alle-mot-konfirmanten"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- MODE ---------------- */

const mode = new URLSearchParams(window.location.search).get("mode") || "player";

let player = localStorage.getItem("player") || "";

/* ---------------- QUESTIONS ---------------- */

const questions = [
  "Sengestrekk",
  "Straffespark",
  "Bottleflip",
  "Vannpistol og telys",
  "Biola bånnski",
  "Vann på hodet",
  "Triksekongen",
  "Frisbeekast"
];

/* ---------------- VIEW CONTROL (IMPORTANT FIX) ---------------- */

function hideAll(){
  document.querySelectorAll(".view").forEach(v=>{
    v.style.display = "none";
  });
}

function show(id){
  hideAll();
  document.getElementById(id).style.display = "block";
}

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {

  listen();

  if(mode === "admin"){
    show("adminLobby"); // 🔥 ALWAYS FIRST, NO SNAPSHOT INVOLVED
    generateQR();
  } else {
    show("login");
  }
});

/* ---------------- QR ---------------- */

function generateQR(){
  const url = window.location.origin + window.location.pathname + "?mode=join";

  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
    + encodeURIComponent(url);
}

/* ---------------- LISTEN ---------------- */

function listen(){
  onSnapshot(doc(db,"game","state"), snap=>{
    if(!snap.exists()) return;

    const data = snap.data();
    render(data);
  });
}

/* ---------------- RENDER (SPLIT LOGIC FIX) ---------------- */

function render(data){

  const q = questions[data.currentRound] || "Ferdig!";

  /* ---------------- ADMIN FLOW ---------------- */
  if(mode === "admin"){

    document.getElementById("adminState").innerText =
      `State: ${data.gameState} | Runde: ${data.currentRound}`;

    document.getElementById("currentQuestion").innerText = q;

    // 🔥 IMPORTANT: NO AUTO SWITCH ON FIRST LOAD
    // only switch AFTER state exists
    if(data.gameState === "lobby"){
      show("adminLobby");
    } else {
      show("adminControl");
    }
  }

  /* ---------------- PLAYER FLOW ---------------- */
  if(mode !== "admin"){

    const title = document.getElementById("title");
    const box = document.getElementById("answerBox");

    if(data.gameState === "lobby"){
      show("player");
      title.innerText = "Venter på start...";
      box.style.display = "none";
    }

    if(data.gameState === "question"){
      show("player");
      title.innerText = q;
      box.style.display = "none";
    }

    if(data.gameState === "answering"){
      show("player");
      title.innerText = q;
      box.style.display = "block";
    }

    if(data.gameState === "locked"){
      show("player");
      title.innerText = "Svar låst";
      box.style.display = "none";
    }
  }
}

/* ---------------- JOIN ---------------- */

window.join = async () => {

  const name = document.getElementById("name").value;

  player = name;
  localStorage.setItem("player", name);

  await setDoc(doc(db,"players",name),{
    name
  });

  show("player");
};

/* ---------------- ADMIN ---------------- */

window.startGame = async () => {
  await setDoc(doc(db,"game","state"),{
    gameState:"question",
    currentRound:0
  });
};

window.startAnswer = async () => {
  await updateDoc(doc(db,"game","state"),{
    gameState:"answering"
  });
};

window.lock = async () => {
  await updateDoc(doc(db,"game","state"),{
    gameState:"locked"
  });
};

window.next = async () => {

  const snap = await getDoc(doc(db,"game","state"));
  const data = snap.data();

  let nextRound = data.currentRound + 1;

  if(nextRound >= 8){
    await updateDoc(doc(db,"game","state"),{
      gameState:"finished",
      currentRound:7
    });
    return;
  }

  await updateDoc(doc(db,"game","state"),{
    gameState:"question",
    currentRound:nextRound
  });
};

</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="view">
<h1>Alle mot Daniel</h1>

<input id="name" placeholder="Kallenavn"><br>
<button onclick="join()">Bli med</button>
</div>

<!-- PLAYER -->
<div id="player" class="view">
<h2 id="title"></h2>

<div id="answerBox" style="display:none;">
<input type="range" min="0" max="100" value="50">
</div>
</div>

<!-- ADMIN LOBBY (FIXED STABLE FRONT PAGE) -->
<div id="adminLobby" class="view">
<h1>Alle mot Daniel</h1>

<div class="qr">
<img id="qr">
</div>

<h3 id="adminState"></h3>

<button onclick="startGame()">Start spillet</button>
</div>

<!-- ADMIN CONTROL -->
<div id="adminControl" class="view">
<h1>ADMIN</h1>

<h2 id="currentQuestion"></h2>

<h3 id="adminState"></h3>

<button onclick="startAnswer()">Start svar</button>
<button onclick="lock()">Lås</button>
<button onclick="next()">Neste</button>
</div>

</body>
</html>
