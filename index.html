<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alle mot Daniel - FINAL STABLE</title>

<!-- QR LIB -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0}
.view{display:none;padding:20px}
input,select,button{padding:10px;margin:5px;font-size:16px}
.slider{width:80%}
canvas{background:white;border-radius:12px;margin-top:10px}
#players div{padding:5px;border-bottom:1px solid #333}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDE7WQY2NZ8ZgAvD8Rm1Mq_owxddA8LHQM",
  authDomain: "alle-mot-konfirmanten.firebaseapp.com",
  projectId: "alle-mot-konfirmanten"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const mode = new URLSearchParams(window.location.search).get("mode") || "player";
let player = localStorage.getItem("player") || "";
let role = localStorage.getItem("role") || "player";
let round = 0;
let locked = false;

const questions = [
  "Sengestrekk",
  "Straffespark",
  "Bottle flip",
  "Vannpistol og telys",
  "Biola bånnski",
  "Vann på hodet",
  "Triksekongen",
  "Frisbeekast"
];

function show(id){
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById(id).style.display="block";
}

// ROUTING
window.addEventListener("load", () => {
  if(mode === "admin") show("adminLobby");
  else show(player ? "game" : "login");

  if(mode === "admin") generateQR();
});

// QR GENERATOR (SAFE)
function generateQR(){
  const url = window.location.origin + window.location.pathname + "?mode=join";

  const canvas = document.getElementById("qr");
  const link = document.getElementById("joinLink");

  if(!canvas) return;

  link.innerText = url;

  QRCode.toCanvas(canvas, url, function (err) {
    if(err) console.error("QR error", err);
  });
}

// JOIN
window.join = async () => {
  const name = document.getElementById("name").value;
  const selectedRole = document.getElementById("role").value;
  if(!name) return alert("Skriv kallenavn");

  player = name;
  role = selectedRole;

  localStorage.setItem("player", name);
  localStorage.setItem("role", selectedRole);

  await setDoc(doc(db,"players",name),{
    name,
    role,
    score:0
  });

  show("game");
};

// ANSWER
window.sendAnswer = async () => {
  if(locked) return alert("Låst");

  const val = Number(document.getElementById("slider").value);

  await addDoc(collection(db,"answers"),{
    name:player,
    role,
    value:val,
    round
  });
};

// TIMER
window.startTimer = () => {
  locked = false;
  let t = 30;

  const el = document.getElementById("timer");

  const i = setInterval(()=>{
    el.innerText = "Tid: " + t;
    t--;
    if(t < 0){
      clearInterval(i);
      locked = true;
    }
  },1000);
};

// NEXT
window.next = () => {
  round++;
  document.getElementById("questionTitle").innerText = questions[round] || "Ferdig";
};

// PLAYER LIST
onSnapshot(collection(db,"players"),snap=>{
  const list = document.getElementById("players");
  if(!list) return;

  list.innerHTML = "";
  snap.forEach(d=>{
    const p = d.data();
    list.innerHTML += `<div>${p.name} (${p.role})</div>`;
  });
});

</script>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="view">
<h1>Alle mot Daniel</h1>
<input id="name" placeholder="Kallenavn"><br>
<select id="role">
<option value="player">Deltaker</option>
<option value="daniel">Daniel</option>
</select><br>
<button onclick="join()">Bli med</button>
</div>

<!-- ADMIN -->
<div id="adminLobby" class="view">
<h1>Scan QR for å bli med</h1>

<canvas id="qr" width="220" height="220"></canvas>
<p id="joinLink"></p>

<h3>Deltakere</h3>
<div id="players"></div>

<button onclick="show('adminGame')">Start spillet</button>
</div>

<!-- ADMIN GAME -->
<div id="adminGame" class="view">
<h1 id="questionTitle">Start spill</h1>
<h2 id="timer">Tid: 30</h2>
<button onclick="startTimer()">Nedtelling</button>
<button onclick="next()">Neste</button>
</div>

<!-- GAME -->
<div id="game" class="view">
<h2>Gi svar</h2>
<input type="range" min="0" max="100" value="50" id="slider" class="slider">
<div id="val">50</div>
<button onclick="sendAnswer()">Svar</button>
</div>

<script>
document.addEventListener("input", e=>{
  if(e.target.id === "slider"){
    document.getElementById("val").innerText = e.target.value;
  }
});
</script>

</body>
</html>
