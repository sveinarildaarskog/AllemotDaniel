<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alle mot Daniel - PRO STATE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.view{display:none;padding:20px}

button,input,select{
  padding:10px;
  margin:5px;
  font-size:16px;
}

.card{
  background:#222;
  padding:20px;
  margin:20px auto;
  max-width:500px;
  border-radius:15px;
}

.slider{width:80%}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  updateDoc,
  onSnapshot,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
  apiKey: "AIzaSyDE7WQY2NZ8ZgAvD8Rm1Mq_owxddA8LHQM",
  authDomain: "alle-mot-konfirmanten.firebaseapp.com",
  projectId: "alle-mot-konfirmanten"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- STATE ---------------- */

const mode = new URLSearchParams(window.location.search).get("mode") || "player";

let player = localStorage.getItem("player") || "";
let role = localStorage.getItem("role") || "player";

let gameState = "waiting";
let currentRound = 0;

/* ---------------- VIEW ---------------- */

function show(id){
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById(id).style.display="block";
}

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {

  listenGameState();

  if(mode === "admin"){
    show("admin");
  } else {
    show(player ? "player" : "login");
  }
});

/* ---------------- GAME STATE ---------------- */

function listenGameState(){
  onSnapshot(doc(db,"game","state"), snap=>{
    if(!snap.exists()) return;

    const data = snap.data();

    gameState = data.gameState;
    currentRound = data.currentRound;

    renderPlayer(data);
    renderAdmin(data);
  });
}

/* ---------------- PLAYER UI ---------------- */

function renderPlayer(state){

  if(mode === "admin") return;

  const title = document.getElementById("title");
  const box = document.getElementById("answerBox");

  if(state.gameState === "waiting"){
    show("player");
    title.innerText = "Venter på neste oppgave...";
    box.style.display = "none";
  }

  if(state.gameState === "question"){
    show("player");
    title.innerText = "Oppgave vises snart...";
    box.style.display = "none";
  }

  if(state.gameState === "answering"){
    show("player");
    title.innerText = "SVAR NÅ!";
    box.style.display = "block";
  }

  if(state.gameState === "locked"){
    show("player");
    title.innerText = "Svar låst!";
    box.style.display = "none";
  }
}

/* ---------------- ADMIN UI ---------------- */

function renderAdmin(state){
  if(mode !== "admin") return;

  document.getElementById("adminState").innerText =
    `State: ${state.gameState} | Runde: ${state.currentRound}`;
}

/* ---------------- JOIN ---------------- */

window.join = async () => {

  const name = document.getElementById("name").value;
  const selectedRole = document.getElementById("role").value;

  if(!name) return alert("Skriv navn");

  player = name;
  role = selectedRole;

  localStorage.setItem("player", name);
  localStorage.setItem("role", role);

  await setDoc(doc(db,"players",name),{
    name,
    role,
    online:true,
    lastSeen:Date.now()
  });

  show("player");
};

/* ---------------- ONLINE PRESENCE ---------------- */

/* heartbeat */
setInterval(async ()=>{
  if(!player) return;

  await updateDoc(doc(db,"players",player),{
    online:true,
    lastSeen:Date.now()
  });

},5000);

/* disconnect */
window.addEventListener("beforeunload", async ()=>{
  if(!player) return;

  await updateDoc(doc(db,"players",player),{
    online:false
  });
});

/* ---------------- ANSWER ---------------- */

window.sendAnswer = async () => {

  const val = Number(document.getElementById("slider").value);

  await addDoc(collection(db,"answers"),{
    name:player,
    role,
    value:val,
    round:currentRound
  });

  alert("Sendt!");
};

/* ---------------- ADMIN CONTROL ---------------- */

window.setQuestion = async () => {
  await setDoc(doc(db,"game","state"),{
    gameState:"question",
    currentRound
  });
};

window.startAnswer = async () => {
  await updateDoc(doc(db,"game","state"),{
    gameState:"answering"
  });
};

window.lockAnswers = async () => {
  await updateDoc(doc(db,"game","state"),{
    gameState:"locked"
  });
};

window.nextRound = async () => {
  currentRound++;

  await updateDoc(doc(db,"game","state"),{
    gameState:"waiting",
    currentRound
  });
};

/* ---------------- PLAYER LIST ---------------- */

onSnapshot(collection(db,"players"), snap=>{
  const list = document.getElementById("players");
  if(!list) return;

  list.innerHTML = "";

  const now = Date.now();

  snap.forEach(d=>{
    const p = d.data();

    const online = (now - p.lastSeen) < 10000;

    if(!online) return;

    list.innerHTML += `<div>${p.name} (${p.role})</div>`;
  });
});

</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="view">
<h1>Alle mot Daniel</h1>

<input id="name" placeholder="Kallenavn"><br>

<select id="role">
  <option value="player">Deltaker</option>
  <option value="daniel">Daniel</option>
</select><br>

<button onclick="join()">Bli med</button>
</div>

<!-- PLAYER -->
<div id="player" class="view">
<div class="card">

<h2 id="title">Venter...</h2>

<div id="answerBox" style="display:none;">
  <input type="range" min="0" max="100" value="50" id="slider">
  <div id="val">50</div>
  <button onclick="sendAnswer()">Svar</button>
</div>

</div>
</div>

<!-- ADMIN -->
<div id="admin" class="view">
<h1>ADMIN</h1>

<h3 id="adminState"></h3>

<button onclick="setQuestion()">Vis oppgave</button>
<button onclick="startAnswer()">Start svar</button>
<button onclick="lockAnswers()">Lås</button>
<button onclick="nextRound()">Neste</button>

<h3>Deltakere (online)</h3>
<div id="players"></div>
</div>

<script>
document.addEventListener("input", e=>{
  if(e.target.id==="slider"){
    document.getElementById("val").innerText = e.target.value;
  }
});
</script>

</body>
</html>
